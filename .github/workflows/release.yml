name: build-and-push

# Dispara quando você empurra uma tag de versão (ex.: git push origin v1.0.10).
# Builda a imagem a partir de src/ e publica no ghcr com a versão da tag + :latest.
on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/arrpulse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Versão = tag sem o "v" (v1.0.10 -> 1.0.10)
      - name: Resolver versão
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login no ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
